<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Emotion Detector</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --card: rgba(30, 41, 59, 0.7);
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background: var(--card);
        backdrop-filter: blur(12px);
        padding: 2.5rem;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 450px;
        text-align: center;
      }
      h1 {
        font-weight: 700;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        color: #94a3b8;
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }
      textarea {
        width: 100%;
        height: 100px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #334155;
        background: #1e293b;
        color: white;
        resize: none;
        box-sizing: border-box;
        font-size: 1rem;
      }
      button {
        margin-top: 1.5rem;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: var(--primary);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }
      button:hover {
        background: #4f46e5;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
      }
      #system_response {
        margin-top: 1.5rem;
        padding: 15px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.2);
        font-size: 0.95rem;
        line-height: 1.5;
        min-height: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Emotion AI</h1>
      <p>Analyze the emotional tone of your text.</p>
      <textarea
        id="textToAnalyze"
        placeholder="Type how you're feeling..."
      ></textarea>
      <button onclick="runSentimentAnalysis()">Analyze Emotion</button>
      <div id="system_response">Result will appear here...</div>
    </div>

    <script>
      let runSentimentAnalysis = () => {
        let textToAnalyze = document.getElementById("textToAnalyze").value;
        let responseArea = document.getElementById("system_response");

        responseArea.innerHTML = "Processing...";

        fetch(
          `/emotionDetector?textToAnalyze=${encodeURIComponent(textToAnalyze)}`,
        )
          .then((response) => response.text())
          .then((data) => {
            responseArea.innerHTML = data;
          });
      };
    </script>
  </body>
</html>
